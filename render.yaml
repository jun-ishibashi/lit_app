# Render Blueprint: https://render.com/docs/blueprint-spec
# ダッシュボードで「New > Blueprint」からこのリポジトリを選択してデプロイ

databases:
  - name: lit-app-db
    plan: free

services:
  - type: web
    name: lit-app
    runtime: ruby
    plan: free

    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lit-app-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
        # デプロイ時に config/master.key の内容を手動で設定してください
      - key: RAILS_SERVE_STATIC_FILES
        value: "1"
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
