# SQLite（開発・テスト）. 本番は DATABASE_URL で PostgreSQL を指定
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

# Production: Render 等では DATABASE_URL が設定される（PostgreSQL）
production:
  url: <%= ENV['DATABASE_URL'] %>
